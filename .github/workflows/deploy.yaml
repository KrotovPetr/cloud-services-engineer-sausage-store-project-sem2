name: Sausage Store Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.SAUSAGE_STORE_NAMESPACE }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  CHART_NAME: sausage-store
  CHART_VERSION: "0.1.0"
  RELEASE_NAME: sausage-store

jobs:
  # Сборка и пуш образов в докерхаб:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          # Получение исходного кода из репозитория:
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          # Установка сборщика контейнеров Docker:
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker
          # Авторизация на Docker Hub:
          uses: docker/login-action@v2
          # При помощи with передаём в action параметры username и password:
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Push Backend to DockerHub
          # Одновременный билд и пуш образа в Docker Hub:
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-backend:latest
            build-args: |
              VERSION=${{ github.sha }}
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest

  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
      name: Add Helm Chart To Nexus
      runs-on: ubuntu-latest
      needs: build_and_push_to_docker_hub

      steps:
        - name: Check out the repo
          uses: actions/checkout@v3

        - name: Set up Helm
          uses: azure/setup-helm@v4
          with:
            version: v3.14.0

        - name: Lint Helm chart
          run: helm lint ./sausage-store-chart

        - name: Package Helm chart
          # Упаковываем чарт в архив sausage-store-<version>.tgz
          run: helm package ./sausage-store-chart --version ${CHART_VERSION}

        - name: Upload Helm chart to Nexus
          # Кладём собранный пакет в hosted helm-репозиторий Nexus
          run: |
            curl -sS --fail -u "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" \
              "${NEXUS_HELM_REPO}/" \
              --upload-file "${CHART_NAME}-${CHART_VERSION}.tgz"

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
      name: Deploy Helm Chart To Kubernetes
      runs-on: ubuntu-latest
      needs: add_helm_chart_to_nexus

      steps:
        - name: Set up Helm
          uses: azure/setup-helm@v4
          with:
            version: v3.14.0

        - name: Add Nexus Helm repo
          # Первым шагом добавляем helm-репозиторий Nexus
          run: |
            helm repo add nexus "${NEXUS_HELM_REPO}" \
              --username "${NEXUS_HELM_REPO_USER}" \
              --password "${NEXUS_HELM_REPO_PASSWORD}"
            helm repo update

        - name: Configure kubeconfig
          # kubeconfig из тренажёра хранится в секрете в base64
          run: |
            mkdir -p "$HOME/.kube"
            echo "${KUBE_CONFIG}" | base64 -d > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"

        - name: Deploy chart to Kubernetes
          # Финальный шаг - деплой чарта из Nexus в свой namespace
          env:
            # Поднимаем лимит запросов helm-клиента: в кластере много CRD,
            # из-за чего discovery упирается в дефолтный rate limiter (burst 100)
            HELM_BURST_LIMIT: "1000"
          run: |
            helm upgrade --install "${RELEASE_NAME}" nexus/${CHART_NAME} \
              --version "${CHART_VERSION}" \
              --namespace "${SAUSAGE_STORE_NAMESPACE}" \
              --set global.vault.vaultToken=${VAULT_TOKEN} \
              --timeout 10m \
              --wait
